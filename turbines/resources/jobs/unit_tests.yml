resources:
  jobs:
    run_unit_tests:
      name: turbine-unit-tests
      tasks:
        - task_key: pytest_task
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
          spark_python_task:
            python_file: ../run_tests.py