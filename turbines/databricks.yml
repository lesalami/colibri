bundle:
  name: turbines

include:
  - resources/**/*.yml

variables:
  catalog:
    description: Unity Catalog catalog
  schema:
    description: Unity Catalog schema
  input_path:
    description: Path to turbine CSV files

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-c3ed0cf6-bfd3.cloud.databricks.com
    variables:
      catalog: workspace
      schema: turbines
      input_path: /Volumes/workspace/dev_${workspace.current_user.short_name}_turbines/landing

  prod:
    mode: production
    workspace:
      host: https://dbc-c3ed0cf6-bfd3.cloud.databricks.com
      root_path: /Workspace/Users/lesalami@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: turbines
      input_path: /Volumes/workspace/turbines/landing
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
